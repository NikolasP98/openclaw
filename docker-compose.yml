services:
  minion-gateway:
    platform: ${MINION_DOCKER_PLATFORM:-linux/amd64}
    container_name: ${MINION_GATEWAY_CONTAINER_NAME:-minion_gateway}
    image: ${MINION_IMAGE:-minion:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Browser support: Chromium is installed by default (Standard: ~320MB)
        # To disable: set MINION_DOCKER_APT_PACKAGES="" in your environment
        # To use minimal (no fonts): MINION_DOCKER_APT_PACKAGES="chromium"
        # To use full (with VNC): MINION_DOCKER_APT_PACKAGES="chromium fonts-liberation fonts-noto-color-emoji xvfb x11vnc novnc websockify socat"
        MINION_DOCKER_APT_PACKAGES: "${MINION_DOCKER_APT_PACKAGES:-chromium fonts-liberation fonts-noto-color-emoji}"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MINION_ENV: ${MINION_ENV:-dev}
      MINION_GATEWAY_TOKEN: ${MINION_GATEWAY_TOKEN}
      MINION_LOCK_TIMEOUT_MS: ${MINION_LOCK_TIMEOUT_MS:-30000}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ${MINION_CONFIG_DIR:-~/.minion}:/home/node/.minion
      - ${MINION_WORKSPACE_DIR:-~/.minion/workspace}:/home/node/.minion/workspace
      - ${MINION_GOG_CONFIG_DIR:-~/.config/gogcli}:/home/node/.config/gogcli
      - ${TAILSCALE_SOCKET:-/var/run/tailscale/tailscaled.sock}:/var/run/tailscale/tailscaled.sock
      - ${TAILSCALE_BINARY:-/usr/bin/tailscale}:/usr/bin/tailscale:ro
    ports:
      - "${MINION_GATEWAY_PORT:-18789}:18789"
      - "${MINION_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      ["node", "minion.mjs", "gateway", "--bind", "${MINION_GATEWAY_BIND:-lan}", "--port", "18789"]

  minion-cli:
    platform: ${MINION_DOCKER_PLATFORM:-linux/amd64}
    container_name: ${MINION_CLI_CONTAINER_NAME:-minion_cli}
    image: ${MINION_IMAGE:-minion:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Browser support enabled by default (matches gateway configuration)
        MINION_DOCKER_APT_PACKAGES: "${MINION_DOCKER_APT_PACKAGES:-chromium fonts-liberation fonts-noto-color-emoji}"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MINION_ENV: ${MINION_ENV:-dev}
      MINION_GATEWAY_TOKEN: ${MINION_GATEWAY_TOKEN}
      MINION_LOCK_TIMEOUT_MS: ${MINION_LOCK_TIMEOUT_MS:-30000}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ${MINION_CONFIG_DIR:-~/.minion}:/home/node/.minion
      - ${MINION_WORKSPACE_DIR:-~/.minion/workspace}:/home/node/.minion/workspace
      - ${MINION_GOG_CONFIG_DIR:-~/.config/gogcli}:/home/node/.config/gogcli
      - ${TAILSCALE_SOCKET:-/var/run/tailscale/tailscaled.sock}:/var/run/tailscale/tailscaled.sock
      - ${TAILSCALE_BINARY:-/usr/bin/tailscale}:/usr/bin/tailscale:ro
    stdin_open: true
    tty: true
    init: true
    # Use command instead of entrypoint to ensure entrypoint.sh runs first
    # This ensures consistent initialization (directory creation, default config)
    command: ["node", "minion.mjs"]
