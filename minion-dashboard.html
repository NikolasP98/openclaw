<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minion Gateway Dashboard</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0e17;
        --bg2: #111827;
        --bg3: #1e293b;
        --card: #151d2e;
        --border: #2a3548;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #64748b;
        --accent: #3b82f6;
        --green: #22c55e;
        --red: #ef4444;
        --amber: #f59e0b;
        --purple: #a855f7;
        --pink: #ec4899;
        --cyan: #06b6d4;
        --emerald: #10b981;
        --status-running: #22c55e;
        --status-thinking: #a855f7;
        --status-idle: #64748b;
        --status-aborted: #f59e0b;
        --radius: 10px;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }

      /* Particle canvas */
      #particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        opacity: 0.7;
      }

      /* Topbar */
      #topbar {
        flex-shrink: 0;
        position: relative;
        z-index: 100;
        background: rgba(10, 14, 23, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 9px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #topbar input {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 6px 10px;
        font-family: inherit;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }
      #topbar input:focus {
        border-color: var(--accent);
      }
      #topbar input[type="text"] {
        width: 220px;
      }
      #topbar input[type="password"] {
        width: 160px;
      }
      .conn-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 6px 16px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .conn-btn:hover {
        filter: brightness(1.15);
      }
      .conn-btn.disconnect {
        background: var(--red);
      }
      .conn-led {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        transition:
          background 0.3s,
          box-shadow 0.3s;
      }
      .conn-led.off {
        background: #475569;
        box-shadow: 0 0 4px #475569;
      }
      .conn-led.on {
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
      }
      .conn-led.connecting {
        background: var(--amber);
        box-shadow: 0 0 8px var(--amber);
        animation: led-pulse 1s infinite;
      }
      @keyframes led-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .conn-status {
        font-size: 12px;
        color: var(--text2);
        white-space: nowrap;
      }

      /* Gateway info (topbar right) */
      #gw-info {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        color: var(--text2);
      }
      .gw-tag {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 11px;
        white-space: nowrap;
      }
      .gw-tag.ok {
        border-color: var(--green);
        color: var(--green);
      }
      .gw-tag.warn {
        border-color: var(--amber);
        color: var(--amber);
      }
      .gw-tag.err {
        border-color: var(--red);
        color: var(--red);
      }

      /* App layout */
      #app {
        flex: 1;
        min-height: 0;
        display: flex;
        overflow: hidden;
      }

      /* Sidebar */
      #agent-sidebar {
        width: 260px;
        flex-shrink: 0;
        overflow-y: auto;
        border-right: 1px solid var(--border);
        background: var(--bg2);
        display: flex;
        flex-direction: column;
      }
      .sidebar-header {
        padding: 9px 14px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--text3);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      #sidebar-list {
        flex: 1;
      }
      .sidebar-empty {
        padding: 28px 14px;
        text-align: center;
        color: var(--text3);
        font-size: 12px;
      }
      .agent-row {
        display: flex;
        flex-direction: column;
        padding: 10px 14px;
        border-left: 3px solid transparent;
        border-bottom: 1px solid rgba(42, 53, 72, 0.5);
        cursor: pointer;
        transition: background 0.12s;
      }
      .agent-row:hover {
        background: rgba(255, 255, 255, 0.03);
      }
      .agent-row.selected {
        background: var(--bg3);
        border-left-color: var(--row-accent, var(--accent));
      }
      .agent-row-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .agent-row-status {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
      }
      .agent-row-status.has-active {
        color: var(--status-running);
      }
      .agent-row-spark {
        margin-top: 5px;
        height: 28px;
      }
      .sidebar-spark {
        width: 100%;
        height: 28px;
        display: block;
      }

      /* Detail panel */
      #detail-panel {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .detail-empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text3);
        font-size: 14px;
      }
      .detail-header {
        flex-shrink: 0;
        padding: 13px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .detail-agent-name {
        font-size: 17px;
        font-weight: 700;
        color: var(--text);
      }
      .detail-status-summary {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-left: auto;
      }
      .badge {
        padding: 2px 9px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-running {
        background: rgba(34, 197, 94, 0.12);
        color: var(--status-running);
        border: 1px solid rgba(34, 197, 94, 0.25);
      }
      .badge-thinking {
        background: rgba(168, 85, 247, 0.12);
        color: var(--status-thinking);
        border: 1px solid rgba(168, 85, 247, 0.25);
      }
      .badge-idle {
        background: var(--bg3);
        color: var(--text3);
        border: 1px solid var(--border);
      }

      /* 4-column kanban */
      .detail-kanban {
        flex-shrink: 0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-bottom: 1px solid var(--border);
      }
      .kanban-col {
        border-right: 1px solid var(--border);
      }
      .kanban-col:last-child {
        border-right: none;
      }
      .kanban-col-header {
        padding: 6px 10px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .kanban-col-header.running {
        color: var(--status-running);
        background: rgba(34, 197, 94, 0.04);
      }
      .kanban-col-header.thinking {
        color: var(--status-thinking);
        background: rgba(168, 85, 247, 0.04);
      }
      .kanban-col-header.idle {
        color: var(--status-idle);
        background: rgba(100, 116, 139, 0.04);
      }
      .kanban-col-header.aborted {
        color: var(--status-aborted);
        background: rgba(245, 158, 11, 0.04);
      }
      .kanban-col-header .kcount {
        font-size: 10px;
        font-weight: 400;
        opacity: 0.65;
      }
      .kanban-col-body {
        padding: 6px;
        min-height: 50px;
        max-height: 190px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .kanban-empty {
        color: var(--text3);
        font-size: 10px;
        text-align: center;
        padding: 10px 4px;
        opacity: 0.5;
      }

      /* Session cards */
      .sess-card {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 7px 8px;
        margin-bottom: 5px;
        font-size: 11px;
        font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
        transition: border-color 0.2s;
      }
      .sess-card:hover {
        border-color: var(--accent);
      }
      .sess-key-row {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .sess-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .sess-dot.running {
        background: var(--status-running);
        box-shadow: 0 0 5px var(--status-running);
      }
      .sess-dot.thinking {
        background: var(--status-thinking);
        animation: dot-pulse 0.8s ease infinite;
      }
      .sess-dot.idle {
        background: var(--status-idle);
      }
      .sess-dot.aborted {
        background: var(--status-aborted);
      }
      @keyframes dot-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }
      .sess-key {
        color: var(--text);
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }
      .sess-label {
        color: var(--text2);
        font-size: 10px;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sess-meta {
        color: var(--text3);
        margin-top: 3px;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .sess-model {
        color: var(--accent);
        font-size: 10px;
      }
      .sess-time {
        font-size: 10px;
      }

      /* Chat section */
      .detail-chat {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .chat-messages {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 10px 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .chat-msg {
        max-width: 85%;
        padding: 7px 11px;
        border-radius: 8px;
        font-size: 12px;
        font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
        line-height: 1.5;
        word-wrap: break-word;
        white-space: pre-wrap;
      }
      .chat-msg.user {
        align-self: flex-end;
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 3px;
      }
      .chat-msg.assistant {
        align-self: flex-start;
        background: var(--bg3);
        color: var(--text);
        border-bottom-left-radius: 3px;
      }
      .chat-msg.error {
        align-self: center;
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
        font-size: 11px;
        border-radius: 6px;
        max-width: 95%;
      }
      .chat-msg.stream {
        opacity: 0.8;
        border: 1px dashed var(--border);
      }
      .chat-empty {
        color: var(--text3);
        font-size: 11px;
        text-align: center;
        padding: 20px;
        font-family: inherit;
      }

      /* Typing indicator */
      .typing {
        display: flex;
        gap: 4px;
        padding: 4px 8px;
        align-items: center;
        align-self: flex-start;
      }
      .typing .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text3);
        animation: typing-bounce 0.6s ease infinite;
      }
      .typing .dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing .dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes typing-bounce {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        50% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* Chat input */
      .chat-input-row {
        flex-shrink: 0;
        display: flex;
        gap: 8px;
        padding: 10px 16px;
        border-top: 1px solid var(--border);
      }
      .chat-input {
        flex: 1;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 7px 12px;
        font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
        font-size: 12px;
        outline: none;
        resize: none;
        min-height: 32px;
        max-height: 80px;
      }
      .chat-input:focus {
        border-color: var(--accent);
      }
      .chat-send {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 0 14px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .chat-send:hover {
        filter: brightness(1.15);
      }
      .chat-send:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* Shutdown banner */
      .shutdown-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background: rgba(239, 68, 68, 0.95);
        color: #fff;
        text-align: center;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 600;
        display: none;
      }
      .shutdown-banner.show {
        display: block;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <canvas id="particles"></canvas>
    <div id="shutdown-banner" class="shutdown-banner"></div>

    <!-- Topbar -->
    <div id="topbar">
      <input type="text" id="gw-url" placeholder="ws://host:port" spellcheck="false" />
      <input type="password" id="gw-token" placeholder="Auth token" />
      <button id="conn-btn" class="conn-btn" onclick="toggleConnection()">Connect</button>
      <div id="conn-led" class="conn-led off"></div>
      <span id="conn-status" class="conn-status">Disconnected</span>
      <div id="gw-info" style="display: none"></div>
    </div>

    <!-- App: Sidebar + Detail Panel -->
    <div id="app">
      <div id="agent-sidebar">
        <div class="sidebar-header">Agents</div>
        <div id="sidebar-list"></div>
      </div>
      <div id="detail-panel">
        <div class="detail-empty">Connect to a gateway to get started</div>
      </div>
    </div>

    <!-- SVG gradient for sparklines -->
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <linearGradient id="spark-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity=".4" />
          <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
        </linearGradient>
      </defs>
    </svg>

    <script>
      // ============================================================
      // UUID generator
      // ============================================================
      function uuid() {
        if (crypto.randomUUID) return crypto.randomUUID();
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
          var r = (Math.random() * 16) | 0;
          return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
        });
      }

      // ============================================================
      // State
      // ============================================================
      const state = {
        connected: false,
        connecting: false,
        ws: null,
        pending: new Map(),
        lastSeq: null,
        connectNonce: null,
        connectSent: false,
        backoffMs: 800,
        reconnectTimer: null,
        closed: true,
        connectedAt: null,

        // Hello data
        hello: null,
        snapshot: null,

        // Data
        agents: [],
        defaultAgentId: null,
        sessions: [],
        presence: [],
        health: null,
        channels: null,
        cronJobs: [],

        // Per-agent state keyed by agentId
        agentChat: {}, // { messages, stream, runId, sending, loading, inputText, lastError }
        agentActivity: {}, // { working, lastEventAt, sparkBins: number[30], _workingTimer }

        // UI
        selectedAgentId: null,
        sessionStatus: {}, // { [sessionKey]: 'running'|'thinking'|'idle'|'aborted' }
        sessionStatusTimers: {}, // { [sessionKey]: timer id }
        expandedAgents: new Set(), // kept for compat, unused in new layout
        shutdownReason: null,
        lastTickAt: null,
      };

      // Accent colors for agents
      const ACCENT_COLORS = [
        "#3b82f6",
        "#22c55e",
        "#a855f7",
        "#ec4899",
        "#06b6d4",
        "#f59e0b",
        "#10b981",
        "#ef4444",
      ];

      // ============================================================
      // localStorage persistence
      // ============================================================
      function loadSettings() {
        var url = localStorage.getItem("minion-dash-url");
        var token = localStorage.getItem("minion-dash-token");
        if (url) document.getElementById("gw-url").value = url;
        if (token) document.getElementById("gw-token").value = token;
      }
      function saveSettings() {
        localStorage.setItem("minion-dash-url", document.getElementById("gw-url").value);
        localStorage.setItem("minion-dash-token", document.getElementById("gw-token").value);
      }

      // ============================================================
      // Format helpers
      // ============================================================
      function fmtTokens(n) {
        if (!n || n === 0) return "0";
        if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
        if (n >= 1e3) return (n / 1e3).toFixed(1) + "k";
        return String(n);
      }

      function fmtTimeAgo(ts) {
        if (!ts) return "-";
        var diff = Date.now() - ts;
        if (diff < 0) return "just now";
        var s = Math.floor(diff / 1000);
        if (s < 60) return s + "s ago";
        var m = Math.floor(s / 60);
        if (m < 60) return m + "m ago";
        var h = Math.floor(m / 60);
        if (h < 24) return h + "h ago";
        var d = Math.floor(h / 24);
        return d + "d ago";
      }

      function fmtUptime(ms) {
        if (!ms || ms < 0) return "-";
        var s = Math.floor(ms / 1000);
        var d = Math.floor(s / 86400);
        var h = Math.floor((s % 86400) / 3600);
        var m = Math.floor((s % 3600) / 60);
        var parts = [];
        if (d > 0) parts.push(d + "d");
        if (h > 0) parts.push(h + "h");
        parts.push(m + "m");
        return parts.join(" ");
      }

      function escHtml(s) {
        if (!s) return "";
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function truncKey(key, max) {
        max = max || 28;
        if (!key) return "";
        return key.length > max ? key.slice(0, max) + "\u2026" : key;
      }

      // ============================================================
      // Extract text from chat message (port of message-extract.ts)
      // ============================================================
      function extractText(message) {
        if (!message || typeof message !== "object") return null;
        var m = message;
        var role = typeof m.role === "string" ? m.role : "";
        var content = m.content;

        if (typeof content === "string") {
          return cleanText(content, role);
        }

        if (Array.isArray(content)) {
          var parts = content
            .filter(function (p) {
              return p && p.type === "text" && typeof p.text === "string";
            })
            .map(function (p) {
              return p.text;
            });
          if (parts.length > 0) {
            return cleanText(parts.join("\n"), role);
          }
        }

        if (typeof m.text === "string") {
          return cleanText(m.text, role);
        }
        return null;
      }

      function cleanText(text, role) {
        if (role === "assistant") {
          text = text.replace(/<\s*think(?:ing)?\s*>[\s\S]*?<\s*\/\s*think(?:ing)?\s*>/gi, "");
        }
        text = text.replace(
          /\[\[\s*(?:reply_to_current|reply_to\s*:\s*[^\]\n]+|audio_as_voice)\s*\]\]/gi,
          "",
        );
        text = text.replace(/^<env>[\s\S]*?<\/env>\s*/i, "");
        return text
          .replace(/[ \t]+/g, " ")
          .replace(/[ \t]*\n[ \t]*/g, "\n")
          .trim();
      }

      // ============================================================
      // WebSocket Client
      // ============================================================
      function wsConnect() {
        var url = document.getElementById("gw-url").value.trim();
        var token = document.getElementById("gw-token").value.trim();
        if (!url) return;

        saveSettings();
        state.closed = false;
        state.connecting = true;
        state.connectSent = false;
        state.connectNonce = null;
        updateConnectionUI();

        try {
          var ws = new WebSocket(url);
          state.ws = ws;

          ws.addEventListener("open", function () {
            // Wait for connect.challenge event before sending connect
          });

          ws.addEventListener("message", function (ev) {
            handleMessage(String(ev.data || ""));
          });

          ws.addEventListener("close", function (ev) {
            var reason = String(ev.reason || "");
            state.ws = null;
            state.connected = false;
            state.connecting = false;
            flushPending(new Error("closed (" + ev.code + "): " + reason));
            updateConnectionUI();
            scheduleReconnect();
          });

          ws.addEventListener("error", function () {
            // close handler will fire
          });
        } catch (e) {
          state.connecting = false;
          state.ws = null;
          setConnStatus("Error: " + e.message);
          updateConnectionUI();
        }
      }

      function wsDisconnect() {
        state.closed = true;
        state.connected = false;
        state.connecting = false;
        if (state.reconnectTimer) {
          clearTimeout(state.reconnectTimer);
          state.reconnectTimer = null;
        }
        if (state.ws) {
          state.ws.close();
          state.ws = null;
        }
        flushPending(new Error("disconnected"));
        stopPolling();

        // Clear session status timers
        var timerKeys = Object.keys(state.sessionStatusTimers);
        for (var i = 0; i < timerKeys.length; i++)
          clearTimeout(state.sessionStatusTimers[timerKeys[i]]);
        state.sessionStatusTimers = {};
        state.sessionStatus = {};
        state.selectedAgentId = null;

        // Reset data
        state.hello = null;
        state.snapshot = null;
        state.agents = [];
        state.sessions = [];
        state.presence = [];
        state.health = null;
        state.channels = null;
        state.cronJobs = [];
        state.agentChat = {};
        state.agentActivity = {};
        state.expandedAgents.clear();
        state.shutdownReason = null;
        state.backoffMs = 800;

        document.getElementById("shutdown-banner").classList.remove("show");
        // Reset detail panel
        var panel = document.getElementById("detail-panel");
        if (panel) panel.dataset.agentId = "";
        updateConnectionUI();
        renderHeader();
        renderDashboard();
      }

      function scheduleReconnect() {
        if (state.closed) return;
        var delay = state.backoffMs;
        state.backoffMs = Math.min(state.backoffMs * 1.7, 15000);
        setConnStatus("Reconnecting in " + (delay / 1000).toFixed(1) + "s\u2026");
        state.reconnectTimer = setTimeout(function () {
          state.reconnectTimer = null;
          wsConnect();
        }, delay);
      }

      function flushPending(err) {
        for (var p of state.pending.values()) {
          p.reject(err);
        }
        state.pending.clear();
      }

      function sendRequest(method, params) {
        return new Promise(function (resolve, reject) {
          if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
            return reject(new Error("not connected"));
          }
          var id = uuid();
          state.pending.set(id, { resolve: resolve, reject: reject });
          state.ws.send(JSON.stringify({ type: "req", id: id, method: method, params: params }));
        });
      }

      function sendConnect() {
        if (state.connectSent) return;
        state.connectSent = true;

        var token = document.getElementById("gw-token").value.trim();
        var params = {
          minProtocol: 3,
          maxProtocol: 3,
          client: {
            id: "minion-control-ui",
            version: "1.0",
            platform: "web",
            mode: "webchat",
          },
          role: "operator",
          scopes: [
            "operator.admin",
            "operator.read",
            "operator.write",
            "operator.approvals",
            "operator.pairing",
          ],
          caps: [],
          auth: token ? { token: token } : undefined,
          userAgent: navigator.userAgent,
          locale: navigator.language,
        };

        sendRequest("connect", params)
          .then(function (hello) {
            state.backoffMs = 800;
            state.connected = true;
            state.connecting = false;
            state.hello = hello;
            state.snapshot = hello.snapshot || null;
            state.connectedAt = Date.now();
            updateConnectionUI();
            onHelloOk(hello);
          })
          .catch(function (err) {
            console.error("[dashboard] connect failed:", err);
            if (state.ws) state.ws.close(4008, "connect failed");
          });
      }

      function handleMessage(raw) {
        var parsed;
        try {
          parsed = JSON.parse(raw);
        } catch (e) {
          return;
        }

        var frame = parsed;

        if (frame.type === "event") {
          if (frame.event === "connect.challenge") {
            var payload = frame.payload;
            var nonce = payload && typeof payload.nonce === "string" ? payload.nonce : null;
            state.connectNonce = nonce;
            setTimeout(function () {
              sendConnect();
            }, 200);
            return;
          }

          var seq = typeof frame.seq === "number" ? frame.seq : null;
          if (seq !== null) {
            if (state.lastSeq !== null && seq > state.lastSeq + 1) {
              console.warn("[dashboard] event gap: expected", state.lastSeq + 1, "got", seq);
            }
            state.lastSeq = seq;
          }

          handleEvent(frame);
          return;
        }

        if (frame.type === "res") {
          var pending = state.pending.get(frame.id);
          if (!pending) return;
          state.pending.delete(frame.id);
          if (frame.ok) {
            pending.resolve(frame.payload);
          } else {
            pending.reject(
              new Error(
                frame.error && frame.error.message ? frame.error.message : "request failed",
              ),
            );
          }
        }
      }

      // ============================================================
      // Event Handling
      // ============================================================
      function handleEvent(evt) {
        switch (evt.event) {
          case "agent":
            onAgentEvent(evt.payload);
            break;
          case "chat":
            onChatEvent(evt.payload);
            break;
          case "presence":
            onPresenceEvent(evt.payload);
            break;
          case "health":
            state.health = evt.payload;
            renderHeader();
            break;
          case "tick":
            state.lastTickAt = Date.now();
            break;
          case "shutdown":
            state.shutdownReason = (evt.payload && evt.payload.reason) || "Gateway shutting down";
            var banner = document.getElementById("shutdown-banner");
            banner.textContent = "Gateway shutdown: " + state.shutdownReason;
            banner.classList.add("show");
            break;
        }
      }

      function onAgentEvent(payload) {
        if (!payload) return;
        var agentId = payload.agentId;
        if (!agentId && payload.sessionKey) {
          agentId = parseAgentId(payload.sessionKey);
        }
        if (!agentId) agentId = state.defaultAgentId || "default";

        if (!state.agentActivity[agentId]) {
          state.agentActivity[agentId] = {
            working: false,
            lastEventAt: 0,
            sparkBins: new Array(30).fill(0),
          };
        }
        var act = state.agentActivity[agentId];
        act.lastEventAt = Date.now();
        act.working = true;

        // Bump current sparkline bin
        var binIdx = Math.floor((Date.now() / 10000) % 30);
        act.sparkBins[binIdx] = (act.sparkBins[binIdx] || 0) + 1;

        // Auto-reset working after 5s
        clearTimeout(act._workingTimer);
        var capturedAgentId = agentId;
        act._workingTimer = setTimeout(function () {
          act.working = false;
          renderSidebar();
          renderDetailIfSelected(capturedAgentId);
        }, 5000);

        // Track session status
        if (payload.sessionKey) {
          var sk = payload.sessionKey;
          state.sessionStatus[sk] = "running";
          if (state.sessionStatusTimers[sk]) clearTimeout(state.sessionStatusTimers[sk]);
          (function (capturedSk, capturedAid) {
            state.sessionStatusTimers[capturedSk] = setTimeout(function () {
              if (state.sessionStatus[capturedSk] === "running") {
                state.sessionStatus[capturedSk] = "idle";
              }
              delete state.sessionStatusTimers[capturedSk];
              renderSidebar();
              renderDetailIfSelected(capturedAid);
            }, 30000);
          })(sk, agentId);
        }

        renderSidebar();
        renderDetailIfSelected(agentId);
      }

      function onChatEvent(payload) {
        if (!payload || !payload.sessionKey) return;
        var agentId = parseAgentId(payload.sessionKey);
        if (!agentId) return;

        var chat = ensureAgentChat(agentId);
        var sk = payload.sessionKey;

        // Handle cross-run finals: just reload history
        if (payload.runId && chat.runId && payload.runId !== chat.runId) {
          if (payload.state === "final") {
            loadChatHistory(agentId);
          }
          return;
        }

        if (payload.state === "delta") {
          var text = extractText(payload.message);
          if (typeof text === "string") {
            var current = chat.stream || "";
            if (!current || text.length >= current.length) {
              chat.stream = text;
            }
          }
          // Session status: thinking
          state.sessionStatus[sk] = "thinking";
          if (state.sessionStatusTimers[sk]) clearTimeout(state.sessionStatusTimers[sk]);
          (function (capturedSk, capturedAid) {
            state.sessionStatusTimers[capturedSk] = setTimeout(function () {
              if (state.sessionStatus[capturedSk] === "thinking") {
                state.sessionStatus[capturedSk] = "idle";
              }
              delete state.sessionStatusTimers[capturedSk];
              renderSidebar();
              renderDetailIfSelected(capturedAid);
            }, 60000);
          })(sk, agentId);
        } else if (payload.state === "final") {
          chat.stream = null;
          chat.runId = null;
          loadChatHistory(agentId);
          // Session status: idle
          state.sessionStatus[sk] = "idle";
          if (state.sessionStatusTimers[sk]) {
            clearTimeout(state.sessionStatusTimers[sk]);
            delete state.sessionStatusTimers[sk];
          }
        } else if (payload.state === "aborted") {
          var msg = payload.message;
          if (msg && msg.role === "assistant" && Array.isArray(msg.content)) {
            chat.messages = chat.messages.concat([msg]);
          } else if (chat.stream && chat.stream.trim()) {
            chat.messages = chat.messages.concat([
              {
                role: "assistant",
                content: [{ type: "text", text: chat.stream }],
                timestamp: Date.now(),
              },
            ]);
          }
          chat.stream = null;
          chat.runId = null;
          // Session status: idle
          state.sessionStatus[sk] = "idle";
          if (state.sessionStatusTimers[sk]) {
            clearTimeout(state.sessionStatusTimers[sk]);
            delete state.sessionStatusTimers[sk];
          }
        } else if (payload.state === "error") {
          chat.stream = null;
          chat.runId = null;
          chat.lastError = payload.errorMessage || "chat error";
          // Session status: idle
          state.sessionStatus[sk] = "idle";
          if (state.sessionStatusTimers[sk]) {
            clearTimeout(state.sessionStatusTimers[sk]);
            delete state.sessionStatusTimers[sk];
          }
        }

        renderSidebar();
        renderDetailIfSelected(agentId);
        renderChatBox(agentId);
      }

      function onPresenceEvent(payload) {
        if (Array.isArray(payload)) {
          state.presence = payload;
        } else if (payload) {
          var idx = state.presence.findIndex(function (p) {
            return p.instanceId === payload.instanceId;
          });
          if (idx >= 0) state.presence[idx] = payload;
          else state.presence.push(payload);
        }
        renderHeader();
      }

      // ============================================================
      // Session-to-Agent Resolution
      // ============================================================
      function parseAgentId(sessionKey) {
        if (!sessionKey) return state.defaultAgentId;
        var m = sessionKey.match(/^agent:([^:]+):/);
        if (m) return m[1];
        return state.defaultAgentId;
      }

      // ============================================================
      // Data Loading
      // ============================================================
      function onHelloOk(hello) {
        renderHeader();
        renderDashboard();

        // Fire each request independently so a slow/hanging request (e.g. cron.list)
        // cannot block the critical agents + sessions from loading.
        sendRequest("agents.list", {})
          .then(function (r) {
            console.log("[dashboard] agents.list response:", JSON.stringify(r));
            if (!r) {
              console.warn("[dashboard] agents.list returned null/undefined");
              return;
            }
            state.agents = r.agents || [];
            state.defaultAgentId =
              r.defaultId || (state.agents.length > 0 ? state.agents[0].id : null);
            for (var i = 0; i < state.agents.length; i++) {
              var agent = state.agents[i];
              ensureAgentChat(agent.id);
              if (!state.agentActivity[agent.id]) {
                state.agentActivity[agent.id] = {
                  working: false,
                  lastEventAt: 0,
                  sparkBins: new Array(30).fill(0),
                };
              }
            }
            renderDashboard();
            for (var j = 0; j < state.agents.length; j++) {
              loadChatHistory(state.agents[j].id);
            }
          })
          .catch(function (e) {
            console.error("[dashboard] agents.list error:", e);
          });

        sendRequest("sessions.list", {})
          .then(function (r) {
            if (r) state.sessions = r.sessions || [];
            renderDashboard();
          })
          .catch(function () {});

        sendRequest("health", {})
          .then(function (r) {
            state.health = r;
            renderHeader();
          })
          .catch(function () {});

        sendRequest("system-presence", {})
          .then(function (r) {
            if (Array.isArray(r)) state.presence = r;
            renderHeader();
          })
          .catch(function () {});

        sendRequest("channels.status", {})
          .then(function (r) {
            if (r) state.channels = r;
            renderHeader();
          })
          .catch(function () {});

        sendRequest("cron.list", {})
          .then(function (r) {
            if (r) state.cronJobs = r.jobs || [];
          })
          .catch(function () {});

        // Start polling after a short delay regardless of above completing
        setTimeout(startPolling, 3000);
      }

      function ensureAgentChat(agentId) {
        if (!state.agentChat[agentId]) {
          state.agentChat[agentId] = {
            messages: [],
            stream: null,
            runId: null,
            sending: false,
            loading: false,
            inputText: "",
            lastError: null,
          };
        }
        return state.agentChat[agentId];
      }

      function loadChatHistory(agentId) {
        var chat = ensureAgentChat(agentId);
        var sessionKey = "agent:" + agentId + ":main";
        chat.loading = true;
        renderChatBox(agentId);

        sendRequest("chat.history", { sessionKey: sessionKey, limit: 200 })
          .then(function (res) {
            chat.messages = Array.isArray(res && res.messages) ? res.messages : [];
          })
          .catch(function () {
            // Session might not exist yet — that's fine
          })
          .finally(function () {
            chat.loading = false;
            renderChatBox(agentId);
          });
      }

      function sendChatMsg(agentId) {
        var chat = ensureAgentChat(agentId);
        var msg = chat.inputText.trim();
        if (!msg || chat.sending || !state.connected) return;

        var sessionKey = "agent:" + agentId + ":main";
        var runId = uuid();

        chat.messages = chat.messages.concat([
          {
            role: "user",
            content: [{ type: "text", text: msg }],
            timestamp: Date.now(),
          },
        ]);
        chat.inputText = "";
        chat.sending = true;
        chat.runId = runId;
        chat.stream = "";
        chat.lastError = null;
        renderChatBox(agentId);

        // Clear the input element in detail panel
        var panel = document.getElementById("detail-panel");
        if (panel) {
          var chatBox = panel.querySelector(".detail-chat");
          if (chatBox && chatBox.dataset.agentId === agentId) {
            var inputEl = chatBox.querySelector(".chat-input");
            if (inputEl) inputEl.value = "";
          }
        }

        sendRequest("chat.send", {
          sessionKey: sessionKey,
          message: msg,
          deliver: false,
          idempotencyKey: runId,
        })
          .then(function () {
            chat.sending = false;
            renderChatBox(agentId);
          })
          .catch(function (e) {
            chat.runId = null;
            chat.stream = null;
            chat.sending = false;
            chat.lastError = String(e);
            chat.messages = chat.messages.concat([
              {
                role: "assistant",
                content: [{ type: "text", text: "Error: " + String(e) }],
                timestamp: Date.now(),
              },
            ]);
            renderChatBox(agentId);
          });
      }

      // ============================================================
      // Polling
      // ============================================================
      var pollTimer = null;
      var pollPresenceTimer = null;

      function startPolling() {
        stopPolling();

        pollTimer = setInterval(function () {
          if (!state.connected) return;
          Promise.allSettled([sendRequest("agents.list", {}), sendRequest("sessions.list", {})])
            .then(function (results) {
              if (results[0].status === "fulfilled" && results[0].value) {
                state.agents = results[0].value.agents || [];
                state.defaultAgentId = results[0].value.defaultId || state.defaultAgentId;
              }
              if (results[1].status === "fulfilled" && results[1].value) {
                state.sessions = results[1].value.sessions || [];
              }
              renderDashboard();
            })
            .catch(function () {});
        }, 30000);

        pollPresenceTimer = setInterval(function () {
          if (!state.connected) return;
          sendRequest("system-presence", {})
            .then(function (res) {
              if (Array.isArray(res)) state.presence = res;
              renderHeader();
            })
            .catch(function () {});
        }, 60000);
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        if (pollPresenceTimer) {
          clearInterval(pollPresenceTimer);
          pollPresenceTimer = null;
        }
      }

      // ============================================================
      // Connection UI
      // ============================================================
      function toggleConnection() {
        if (state.connected || state.connecting) {
          wsDisconnect();
        } else {
          wsConnect();
        }
      }

      function updateConnectionUI() {
        var btn = document.getElementById("conn-btn");
        var led = document.getElementById("conn-led");

        if (state.connected) {
          btn.textContent = "Disconnect";
          btn.className = "conn-btn disconnect";
          led.className = "conn-led on";
          setConnStatus("Connected");
          setParticleHue("blue");
        } else if (state.connecting) {
          btn.textContent = "Cancel";
          btn.className = "conn-btn disconnect";
          led.className = "conn-led connecting";
          setConnStatus("Connecting\u2026");
          setParticleHue("amber");
        } else {
          btn.textContent = "Connect";
          btn.className = "conn-btn";
          led.className = "conn-led off";
          if (!state.closed) {
            setParticleHue("amber");
          } else {
            setConnStatus("Disconnected");
            setParticleHue("red");
          }
        }
      }

      function setConnStatus(text) {
        document.getElementById("conn-status").textContent = text;
      }

      // ============================================================
      // Render: Gateway Header (targets #gw-info in topbar)
      // ============================================================
      function renderHeader() {
        var el = document.getElementById("gw-info");
        if (!state.connected && !state.hello) {
          el.style.display = "none";
          return;
        }
        el.style.display = "flex";

        var snap = state.snapshot;
        var version = state.hello && state.hello.protocol ? "v" + state.hello.protocol : "";
        var host =
          state.presence.length > 0 ? (state.presence[0] && state.presence[0].host) || "-" : "-";

        var uptimeStr = "-";
        if (snap && typeof snap === "object" && snap.uptimeMs) {
          var elapsed = Date.now() - (state.connectedAt || Date.now());
          uptimeStr = fmtUptime(snap.uptimeMs + elapsed);
        }

        var deviceCount = state.presence.length;

        var channelHtml = "";
        if (state.channels && state.channels.channelOrder) {
          var order = state.channels.channelOrder;
          var labels = state.channels.channelLabels || {};
          var accounts = state.channels.channelAccounts || {};
          channelHtml = order
            .map(function (ch) {
              var accts = accounts[ch] || [];
              var anyRunning = accts.some(function (a) {
                return a.running || a.connected;
              });
              var cls = anyRunning ? "ok" : accts.length > 0 ? "warn" : "";
              return (
                '<span class="gw-tag ' +
                cls +
                '">' +
                escHtml(labels[ch] || ch) +
                (anyRunning ? ":ok" : "") +
                "</span>"
              );
            })
            .join("");
        }

        var activeJobs = state.cronJobs.filter(function (j) {
          return j.enabled;
        }).length;
        var cronHtml = activeJobs > 0 ? '<span class="gw-tag">' + activeJobs + " cron</span>" : "";

        el.innerHTML =
          (version ? "<span>" + version + "</span>" : "") +
          "<span>Host: <strong>" +
          escHtml(host) +
          "</strong></span>" +
          '<span id="uptime-display">Up: <strong>' +
          uptimeStr +
          "</strong></span>" +
          (deviceCount > 0
            ? "<span>" + deviceCount + " device" + (deviceCount !== 1 ? "s" : "") + "</span>"
            : "") +
          channelHtml +
          cronHtml;
      }

      // ============================================================
      // Session status helpers
      // ============================================================
      function getAgentSessions(agentId) {
        return state.sessions.filter(function (s) {
          return parseAgentId(s.key) === agentId;
        });
      }

      function agentActiveCount(agentId) {
        var sessions = getAgentSessions(agentId);
        return sessions.filter(function (s) {
          var st = state.sessionStatus[s.key];
          return st === "running" || st === "thinking";
        }).length;
      }

      // ============================================================
      // Render: Sidebar
      // ============================================================
      function renderSidebar() {
        var list = document.getElementById("sidebar-list");
        if (!list) return;

        if (!state.connected || state.agents.length === 0) {
          list.innerHTML =
            '<div class="sidebar-empty">' +
            (!state.connected ? "Not connected" : "Waiting for agents\u2026") +
            "</div>";
          return;
        }

        // Sort: agents with active sessions first, then alphabetically
        var sorted = state.agents.slice().sort(function (a, b) {
          var diff = agentActiveCount(b.id) - agentActiveCount(a.id);
          if (diff !== 0) return diff;
          var na = (a.identity && a.identity.name) || a.name || a.id;
          var nb = (b.identity && b.identity.name) || b.name || b.id;
          return na.localeCompare(nb);
        });

        var html = "";
        for (var i = 0; i < sorted.length; i++) {
          var agent = sorted[i];
          var origIdx = state.agents.indexOf(agent);
          var color = ACCENT_COLORS[origIdx % ACCENT_COLORS.length];
          var identity = agent.identity || {};
          var name = identity.name || agent.name || agent.id;
          var emoji = identity.emoji || "\uD83E\uDD16";
          var isSelected = agent.id === state.selectedAgentId;

          var sessions = getAgentSessions(agent.id);
          var runningCount = sessions.filter(function (s) {
            return state.sessionStatus[s.key] === "running";
          }).length;
          var thinkingCount = sessions.filter(function (s) {
            return state.sessionStatus[s.key] === "thinking";
          }).length;
          var hasActive = runningCount + thinkingCount > 0;

          var statusParts = [];
          if (runningCount > 0) statusParts.push(runningCount + " running");
          if (thinkingCount > 0) statusParts.push(thinkingCount + " thinking");
          var statusText = hasActive ? statusParts.join(" \u00b7 ") : "all idle";

          var safeId = agent.id.replace(/\\/g, "\\\\").replace(/'/g, "\\'");

          html +=
            '<div class="agent-row' +
            (isSelected ? " selected" : "") +
            '" ' +
            'data-agent-id="' +
            escHtml(agent.id) +
            '" ' +
            'style="--row-accent:' +
            color +
            '" ' +
            "onclick=\"selectAgent('" +
            safeId +
            "')\">" +
            '<div class="agent-row-name">' +
            escHtml(emoji) +
            " " +
            escHtml(name) +
            "</div>" +
            '<div class="agent-row-status' +
            (hasActive ? " has-active" : "") +
            '">' +
            escHtml(statusText) +
            "</div>" +
            '<div class="agent-row-spark" data-spark="' +
            escHtml(agent.id) +
            '"></div>' +
            "</div>";
        }

        list.innerHTML = html;

        // Render sparklines
        for (var j = 0; j < sorted.length; j++) {
          var sparkContainer = list.querySelector(
            '[data-spark="' + CSS.escape(sorted[j].id) + '"]',
          );
          if (sparkContainer) renderMiniSparkline(sparkContainer, sorted[j].id);
        }
      }

      function renderMiniSparkline(container, agentId) {
        var act = state.agentActivity[agentId];
        var bins = act ? act.sparkBins : new Array(30).fill(0);
        var maxVal = Math.max.apply(null, [1].concat(bins));
        var w = 300,
          h = 28;
        var step = w / (bins.length - 1);

        var points = bins
          .map(function (v, idx) {
            return (idx * step).toFixed(1) + "," + (h - (v / maxVal) * (h - 2)).toFixed(1);
          })
          .join(" ");

        var origIdx = state.agents.findIndex(function (a) {
          return a.id === agentId;
        });
        var color = ACCENT_COLORS[origIdx >= 0 ? origIdx % ACCENT_COLORS.length : 0];

        container.innerHTML =
          '<svg class="sidebar-spark" viewBox="0 0 ' +
          w +
          " " +
          h +
          '" preserveAspectRatio="none">' +
          '<polyline points="' +
          points +
          '" fill="none" stroke="' +
          color +
          '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>' +
          "</svg>";
      }

      // ============================================================
      // Render: Select Agent
      // ============================================================
      function selectAgent(agentId) {
        state.selectedAgentId = agentId;

        // Force full rebuild of detail panel for the new agent
        var panel = document.getElementById("detail-panel");
        if (panel) panel.dataset.agentId = "";

        renderSidebar();
        renderDetail();

        // Load chat if not yet loaded
        var chat = ensureAgentChat(agentId);
        if (!chat.loading && chat.messages.length === 0 && state.connected) {
          loadChatHistory(agentId);
        }
      }

      // ============================================================
      // Render: Detail Panel
      // ============================================================
      function renderDetail() {
        var panel = document.getElementById("detail-panel");
        if (!panel) return;

        if (!state.selectedAgentId) {
          panel.innerHTML =
            '<div class="detail-empty">' +
            (state.connected
              ? "Select an agent from the sidebar"
              : "Connect to a gateway to get started") +
            "</div>";
          panel.dataset.agentId = "";
          return;
        }

        var agent = state.agents.find(function (a) {
          return a.id === state.selectedAgentId;
        });
        if (!agent) {
          panel.innerHTML = '<div class="detail-empty">Agent not found</div>';
          panel.dataset.agentId = "";
          return;
        }

        // If same agent already rendered, only update dynamic parts (preserves chat input/scroll)
        if (panel.dataset.agentId === agent.id) {
          renderDetailHeader();
          renderDetailKanban();
          return;
        }

        // Full rebuild for newly selected agent
        panel.dataset.agentId = agent.id;
        var identity = agent.identity || {};
        var name = identity.name || agent.name || agent.id;
        var emoji = identity.emoji || "\uD83E\uDD16";
        var safeAgentId = escHtml(agent.id);

        panel.innerHTML =
          '<div class="detail-header" id="detail-header">' +
          '<div class="detail-agent-name">' +
          escHtml(emoji) +
          " " +
          escHtml(name) +
          "</div>" +
          '<div class="detail-status-summary" id="detail-status-summary"></div>' +
          "</div>" +
          '<div class="detail-kanban" id="detail-kanban"></div>' +
          '<div class="detail-chat" data-agent-id="' +
          safeAgentId +
          '">' +
          '<div class="chat-messages"></div>' +
          '<div class="chat-input-row">' +
          '<textarea class="chat-input" rows="1" placeholder="Type a message\u2026" data-agent="' +
          safeAgentId +
          '"></textarea>' +
          '<button class="chat-send" data-agent="' +
          safeAgentId +
          '">Send</button>' +
          "</div>" +
          "</div>";

        // Attach chat event listeners
        var inputEl = panel.querySelector(".chat-input");
        var sendBtn = panel.querySelector(".chat-send");

        inputEl.addEventListener("keydown", function (e) {
          var aid = this.dataset.agent;
          var chat = ensureAgentChat(aid);
          chat.inputText = this.value;
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendChatMsg(aid);
          }
        });

        inputEl.addEventListener("input", function () {
          ensureAgentChat(this.dataset.agent).inputText = this.value;
        });

        sendBtn.addEventListener("click", function () {
          sendChatMsg(this.dataset.agent);
        });

        // Restore any in-progress input text
        var chat = state.agentChat[agent.id];
        if (chat && chat.inputText) inputEl.value = chat.inputText;

        // Fill in dynamic parts
        renderDetailHeader();
        renderDetailKanban();
        renderChatBox(agent.id);
      }

      function renderDetailHeader() {
        var el = document.getElementById("detail-status-summary");
        if (!el || !state.selectedAgentId) return;

        var sessions = getAgentSessions(state.selectedAgentId);
        var runningCount = sessions.filter(function (s) {
          return state.sessionStatus[s.key] === "running";
        }).length;
        var thinkingCount = sessions.filter(function (s) {
          return state.sessionStatus[s.key] === "thinking";
        }).length;

        var html = "";
        if (runningCount > 0)
          html += '<span class="badge badge-running">' + runningCount + " running</span>";
        if (thinkingCount > 0)
          html += '<span class="badge badge-thinking">' + thinkingCount + " thinking</span>";
        if (runningCount + thinkingCount === 0)
          html = '<span class="badge badge-idle">all idle</span>';

        el.innerHTML = html;
      }

      function renderDetailKanban() {
        var el = document.getElementById("detail-kanban");
        if (!el || !state.selectedAgentId) return;

        var sessions = getAgentSessions(state.selectedAgentId);
        var running = sessions.filter(function (s) {
          return state.sessionStatus[s.key] === "running";
        });
        var thinking = sessions.filter(function (s) {
          return state.sessionStatus[s.key] === "thinking";
        });
        var aborted = sessions.filter(function (s) {
          return s.abortedLastRun === true || state.sessionStatus[s.key] === "aborted";
        });

        var runningKeys = new Set(
          running.map(function (s) {
            return s.key;
          }),
        );
        var thinkingKeys = new Set(
          thinking.map(function (s) {
            return s.key;
          }),
        );
        var abortedKeys = new Set(
          aborted.map(function (s) {
            return s.key;
          }),
        );
        var idle = sessions.filter(function (s) {
          return !runningKeys.has(s.key) && !thinkingKeys.has(s.key) && !abortedKeys.has(s.key);
        });

        el.innerHTML =
          buildKanbanColHtml("running", "Running", running) +
          buildKanbanColHtml("thinking", "Thinking", thinking) +
          buildKanbanColHtml("idle", "Idle", idle) +
          buildKanbanColHtml("aborted", "Aborted", aborted);
      }

      function buildKanbanColHtml(type, label, sessions) {
        var cardHtml = "";
        if (sessions.length === 0) {
          cardHtml = '<div class="kanban-empty">\u2014</div>';
        } else {
          var limit = Math.min(sessions.length, 15);
          for (var i = 0; i < limit; i++) {
            var s = sessions[i];
            var dotStatus = type === "aborted" ? "aborted" : state.sessionStatus[s.key] || "idle";
            var labelHtml = s.label ? '<div class="sess-label">' + escHtml(s.label) + "</div>" : "";
            var modelStr = s.model ? s.model.replace(/^claude-/, "").replace(/-\d{8}$/, "") : "";
            var modelHtml = modelStr
              ? '<span class="sess-model">' + escHtml(modelStr) + "</span>"
              : "";
            cardHtml +=
              '<div class="sess-card">' +
              '<div class="sess-key-row">' +
              '<span class="sess-dot ' +
              dotStatus +
              '"></span>' +
              '<span class="sess-key" title="' +
              escHtml(s.key) +
              '">' +
              escHtml(truncKey(s.key)) +
              "</span>" +
              "</div>" +
              labelHtml +
              '<div class="sess-meta">' +
              '<span class="sess-time">' +
              fmtTimeAgo(s.updatedAt) +
              "</span>" +
              modelHtml +
              "</div>" +
              "</div>";
          }
          if (sessions.length > limit) {
            cardHtml += '<div class="kanban-empty">+' + (sessions.length - limit) + " more</div>";
          }
        }

        return (
          '<div class="kanban-col">' +
          '<div class="kanban-col-header ' +
          type +
          '">' +
          "<span>" +
          label +
          "</span>" +
          '<span class="kcount">' +
          sessions.length +
          "</span>" +
          "</div>" +
          '<div class="kanban-col-body">' +
          cardHtml +
          "</div>" +
          "</div>"
        );
      }

      function renderDetailIfSelected(agentId) {
        if (agentId !== state.selectedAgentId) return;
        renderDetailHeader();
        renderDetailKanban();
      }

      // ============================================================
      // Render: Dashboard (Sidebar + Detail)
      // ============================================================
      function renderDashboard() {
        // Auto-select first agent if nothing selected
        if (!state.selectedAgentId && state.agents.length > 0) {
          state.selectedAgentId = state.agents[0].id;
        }
        renderSidebar();
        renderDetail();
      }

      // ============================================================
      // Chat Rendering
      // ============================================================
      function renderChatBox(agentId) {
        var panel = document.getElementById("detail-panel");
        if (!panel) return;

        var chatBox = panel.querySelector(".detail-chat");
        if (!chatBox || chatBox.dataset.agentId !== agentId) return;

        var chat = state.agentChat[agentId];
        if (!chat) return;

        var messagesEl = chatBox.querySelector(".chat-messages");
        var sendBtn = chatBox.querySelector(".chat-send");
        var inputEl = chatBox.querySelector(".chat-input");

        var html = "";
        if (chat.loading) {
          html = '<div class="chat-empty">Loading chat\u2026</div>';
        } else if (chat.messages.length === 0 && chat.stream === null) {
          html = '<div class="chat-empty">No messages yet. Send a message to start chatting.</div>';
        } else {
          for (var i = 0; i < chat.messages.length; i++) {
            var msg = chat.messages[i];
            var role = msg.role || "unknown";
            var text = extractText(msg);
            if (!text) continue;
            var cls = role === "user" ? "user" : role === "assistant" ? "assistant" : "error";
            html += '<div class="chat-msg ' + cls + '">' + escHtml(text) + "</div>";
          }

          if (chat.stream !== null) {
            if (chat.stream) {
              html += '<div class="chat-msg assistant stream">' + escHtml(chat.stream) + "</div>";
            }
            html +=
              '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
          }

          if (chat.lastError) {
            html += '<div class="chat-msg error">' + escHtml(chat.lastError) + "</div>";
          }
        }

        messagesEl.innerHTML = html;
        messagesEl.scrollTop = messagesEl.scrollHeight;

        sendBtn.disabled = chat.sending || !state.connected;

        if (document.activeElement !== inputEl) {
          inputEl.value = chat.inputText;
        }
      }

      // ============================================================
      // Sparkline decay (every 10s)
      // ============================================================
      setInterval(function () {
        var keys = Object.keys(state.agentActivity);
        for (var i = 0; i < keys.length; i++) {
          var act = state.agentActivity[keys[i]];
          var currentBin = Math.floor((Date.now() / 10000) % 30);
          var nextBin = (currentBin + 1) % 30;
          act.sparkBins[nextBin] = 0;
        }
      }, 10000);

      // ============================================================
      // Uptime Ticker
      // ============================================================
      setInterval(function () {
        if (!state.connected || !state.snapshot) return;
        var el = document.getElementById("uptime-display");
        if (!el) return;
        var snap = state.snapshot;
        if (snap && typeof snap === "object" && snap.uptimeMs) {
          var elapsed = Date.now() - (state.connectedAt || Date.now());
          el.innerHTML = "Up: <strong>" + fmtUptime(snap.uptimeMs + elapsed) + "</strong>";
        }
      }, 1000);

      // ============================================================
      // Particle Background
      // ============================================================
      var particleHue = "red";
      function setParticleHue(h) {
        particleHue = h;
      }

      (function initParticles() {
        var canvas = document.getElementById("particles");
        var ctx = canvas.getContext("2d");
        var w, h;
        var particles = [];
        var PARTICLE_COUNT = 50;
        var LINE_DIST = 120;

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        for (var i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            r: Math.random() * 2 + 1,
          });
        }

        function getColor(alpha) {
          if (particleHue === "blue") return "rgba(59, 130, 246, " + alpha + ")";
          if (particleHue === "amber") return "rgba(245, 158, 11, " + alpha + ")";
          return "rgba(239, 68, 68, " + alpha + ")";
        }

        function draw() {
          ctx.clearRect(0, 0, w, h);

          for (var i = 0; i < particles.length; i++) {
            for (var j = i + 1; j < particles.length; j++) {
              var dx = particles[i].x - particles[j].x;
              var dy = particles[i].y - particles[j].y;
              var dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < LINE_DIST) {
                var alpha = (1 - dist / LINE_DIST) * 0.12;
                ctx.strokeStyle = getColor(alpha);
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
              }
            }
          }

          for (var k = 0; k < particles.length; k++) {
            var p = particles[k];
            ctx.fillStyle = getColor(0.4);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();

            p.x += p.vx;
            p.y += p.vy;

            if (p.x < 0 || p.x > w) p.vx *= -1;
            if (p.y < 0 || p.y > h) p.vy *= -1;
          }

          requestAnimationFrame(draw);
        }
        draw();
      })();

      // ============================================================
      // Init
      // ============================================================
      loadSettings();

      document.getElementById("gw-url").addEventListener("keydown", function (e) {
        if (e.key === "Enter") toggleConnection();
      });
      document.getElementById("gw-token").addEventListener("keydown", function (e) {
        if (e.key === "Enter") toggleConnection();
      });

      // Auto-connect: ?autoconnect in URL, or ?url=...&token=... params
      (function autoConnect() {
        var params = new URLSearchParams(window.location.search);
        if (params.get("url")) document.getElementById("gw-url").value = params.get("url");
        if (params.get("token")) document.getElementById("gw-token").value = params.get("token");
        if (params.has("url") || params.has("token")) saveSettings();

        var shouldConnect = params.has("autoconnect") || params.has("url");
        var url = document.getElementById("gw-url").value.trim();
        var token = document.getElementById("gw-token").value.trim();
        if (shouldConnect && url && token) {
          setTimeout(function () {
            if (!state.connected && !state.connecting) wsConnect();
          }, 500);
        }
      })();
    </script>
  </body>
</html>
