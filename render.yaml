services:
  - type: web
    name: minion
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: MINION_STATE_DIR
        value: /data/.minion
      - key: MINION_WORKSPACE_DIR
        value: /data/workspace
      - key: MINION_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: minion-data
      mountPath: /data
      sizeGB: 1
