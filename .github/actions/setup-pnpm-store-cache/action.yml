name: Setup pnpm + store cache
description: Prepare pnpm via corepack and restore pnpm store cache.
inputs:
  pnpm-version:
    description: >
      pnpm version to activate via corepack.
      If empty, auto-resolved from package.json packageManager field.
    required: false
    default: ""
  cache-key-suffix:
    description: Suffix appended to the cache key.
    required: false
    default: "node22"
runs:
  using: composite
  steps:
    - name: Resolve pnpm version
      id: resolve
      shell: bash
      run: |
        if [ -n "${{ inputs.pnpm-version }}" ]; then
          echo "version=${{ inputs.pnpm-version }}" >> "$GITHUB_OUTPUT"
        elif command -v node &>/dev/null; then
          PKG_MGR=$(node -p "require('./package.json').packageManager || ''")
          VERSION="${PKG_MGR#pnpm@}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$PKG_MGR" ]; then
            echo "::error::Cannot resolve pnpm version from package.json packageManager field"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        else
          # Fallback: extract version without Node (e.g., install-smoke before Node setup)
          VERSION=$(grep -o '"packageManager":\s*"pnpm@[^"]*"' package.json | grep -o '[0-9][0-9.]*')
          if [ -z "$VERSION" ]; then
            echo "::error::Cannot resolve pnpm version (no Node, no packageManager in package.json)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup pnpm (corepack retry)
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        for attempt in 1 2 3; do
          if corepack prepare "pnpm@${{ steps.resolve.outputs.version }}" --activate; then
            pnpm -v
            exit 0
          fi
          echo "corepack prepare failed (attempt $attempt/3). Retrying..."
          sleep $((attempt * 10))
        done
        exit 1

    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ inputs.cache-key-suffix }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-${{ inputs.cache-key-suffix }}-
